name: Deploy Documentation

on:
  push:
    tags:
      - '*.*.*'
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      - '.github/workflows/_docs-build.yml'
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/_docs-build.yml

  deploy-stable:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site

      - name: Deploy to GitHub Pages (stable)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: .
          commit_message: "docs(stable): deploy ${{ github.ref_name }}"

  deploy-dev:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site

      - name: Deploy to GitHub Pages (dev)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: dev
          commit_message: "docs(dev): deploy ${{ github.sha }}"
